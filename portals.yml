# Job portal scanner configuration.
# The scanner checks these sources for new job listings matching your profile.

# --- Location Filter ---
# Only show jobs in these countries. Leave empty to show all locations.
# Also matches "Remote" if include_remote is true.
location_filter:
  countries:
    - United States
    - US
    - USA
  include_remote: true

# --- Sponsorship Filter ---
# Set to true if you need visa sponsorship.
# Jobs that explicitly say "no sponsorship" will be filtered out.
needs_sponsorship: true

# --- Title Filter ---
# Applied to ALL discovered jobs regardless of source.
# At least one positive keyword must match. Zero negative keywords can match.
title_filter:
  positive:
    - AI
    - LLM
    - Agent
    - Agentic
    - GenAI
    - Generative AI
    - NLP
    - LLMOps
    - MLOps
    - Voice AI
    - Conversational AI
    - Speech
    - Forward Deployed
    - Deployed Engineer
  # -- Automation roles --
    - Automation
    - Hyperautomation
    - Low-Code
    - No-Code
    - GTM Engineer
    - RevOps
    - data analyst
    - business intelligence
    - business
    - analytics engineer
    - data engineer
  negative:
    - affairs
    - intern
    - director
    - vice president
    - SDE
    - vp
    - principal
    - staff
    - Android
    - iOS
    - Manager
    - Sales
    - Claims
    - Software Engineer
    - data scientist
    - Phd
    - Legal
    - Partner
    - Marketing
    - Campaign
    - Licensing
    - security
    - Compliance
    - Recruiter
    - Talent
    - HR
    - Office Administrator
