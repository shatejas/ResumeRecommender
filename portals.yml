# --- Search Queries ---
# Web search for broader discovery beyond tracked companies.
# Each query is run as a Google search with site filters.
search_queries:
  - query: '"data analyst"'
    sites:
      - jobs.lever.co
      - boards.greenhouse.io
      - jobs.ashbyhq.com
    enabled: true
  - query: '"data engineer"'
    sites:
      - jobs.lever.co
      - boards.greenhouse.io
      - jobs.ashbyhq.com
    enabled: true
  - query: '"business analyst"'
    sites:
      - jobs.lever.co
      - boards.greenhouse.io
      - jobs.ashbyhq.com
    enabled: true
  - query: '"business intelligence"'
    sites:
      - jobs.lever.co
      - boards.greenhouse.io
      - jobs.ashbyhq.com
    enabled: true
  - query: '"forward deploy"'
    sites:
      - jobs.lever.co
      - boards.greenhouse.io
      - jobs.ashbyhq.com
    enabled: true
  - query: '"automation"'
    sites:
      - jobs.lever.co
      - boards.greenhouse.io
      - jobs.ashbyhq.com
    enabled: true
  - query: '"agent"'
    sites:
      - jobs.lever.co
      - boards.greenhouse.io
      - jobs.ashbyhq.com
    enabled: true

  # --- Direct Career Site Searches ---
  # type: career_site — uses Playwright to search a company's career page directly
  # {query} in search_url gets replaced with each keyword from the queries list
  - type: career_site
    company: Netflix
    search_url: "https://explore.jobs.netflix.net/careers?query={query}"
    queries:
      - Data Analyst
      - Data Engineer
      - Business Intelligence
      - Business analyst
    enabled: true
  - type: career_site
    company: Amazon
    search_url: "https://www.amazon.jobs/en/search?base_query={query}"
    queries:
      - Data Analyst
      - Data Engineer
      - Business Intelligence
      - Business analyst
    enabled: true
  - type: career_site
    company: Microsoft
    search_url: "https://careers.microsoft.com/us/en/search-results?keywords={query}"
    queries:
      - Data Analyst
      - Data Engineer
      - Business Intelligence
      - Business analyst
    enabled: true
  - type: career_site
    company: Apple
    search_url: "https://jobs.apple.com/en-us/search?search={query}"
    queries:
      - Data Analyst
      - Data Engineer
      - Business Intelligence
      - Business analyst
    enabled: false
